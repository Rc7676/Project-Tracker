    if (!roleCanSee(p)) return false;
    const openTodos = p.todos.filter(t => !t.done).length;
    if (!passesMultiFilter(categoryFilters, CATEGORIES.length, () => categoryFilters.includes(p.category))) return false;
    if (!passesMultiFilter(statusFilters, STAGES.length, () => statusFilters.includes(p.statusIndex))) return false;
    if (!passesMultiFilter(pileFilters, PILE_OPTIONS.length, () => pileFilters.includes(getPile(p)))) return false;
    if (assigneeFilter && assigneeFilter !== "all") {
      if (assigneeFilter === "__unassigned__") { if (p.assignee) return false; }
      else if (p.assignee !== assigneeFilter) return false;
    }
    if (state.ui.dueFilter && state.ui.dueFilter !== "all") {
      const di = dueInfo(projectDueDate(p));
      if (state.ui.dueFilter === "overdue" && (!di || di.state !== "overdue")) return false;
      if (state.ui.dueFilter === "soon" && (!di || di.state === "normal")) return false;
    }
    if (!passesMultiFilter(todoFilters, 2, () => {
      return (todoFilters.includes("hasOpen") && openTodos > 0) ||
             (todoFilters.includes("none") && p.todos.length === 0);
    })) return false;
    if (query) {
      const inName = p.name.toLowerCase().includes(query);
      const inNotes = p.notes.some(n => n.text.toLowerCase().includes(query));
      const inQuests = p.todos.some(t =>
        t.text.toLowerCase().includes(query) ||
        (t.description || "").toLowerCase().includes(query) ||
        (t.subs || []).some(s => s.text.toLowerCase().includes(query))
      );
      if (!inName && !inNotes && !inQuests) return false;
    }
    return true;
  });

  const collator = new Intl.Collator();
  switch (sortBy) {
    case "name-asc":
      result.sort((a, b) => collator.compare(a.name, b.name));
      break;
    case "name-desc":
      result.sort((a, b) => collator.compare(b.name, a.name));
      break;
    case "status-asc":
      result.sort((a, b) => a.statusIndex - b.statusIndex);
      break;
    case "status-desc":
      result.sort((a, b) => b.statusIndex - a.statusIndex);
      break;
    case "todos-desc":
      result.sort((a, b) => (b.todos.filter(t => !t.done).length) - (a.todos.filter(t => !t.done).length));
      break;
    case "due-asc":
      // Soonest due date first (from open to-dos); projects with none go last.
      result.sort((a, b) => {
        const ad = projectDueDate(a), bd = projectDueDate(b);
        if (!ad && !bd) return collator.compare(a.name, b.name);
        if (!ad) return 1;
        if (!bd) return -1;
        return ad.localeCompare(bd);
      });
      break;
    default:
      if (categoryFilters.length !== 1) {
        result.sort((a, b) => collator.compare(a.name, b.name));
      }
      break;
  }
  return result;
}

/* ---------- Toolbar ---------- */

function toggleInArray(arr, val) {
  const idx = arr.indexOf(val);
  if (idx === -1) arr.push(val); else arr.splice(idx, 1);
}

function renderMultiChipGroup(cfg) {
  const { containerId, options, getSelected, onToggle, onAll } = cfg;
  const group = document.getElementById(containerId);
  group.innerHTML = "";

  const selected = getSelected();
  const isAllActive = selected.length === options.length;

  const allChip = document.createElement("button");
  allChip.className = "chip" + (isAllActive ? " active" : "");
  allChip.textContent = "All";
  if (isAllActive) allChip.style.background = "#323338";
  allChip.addEventListener("click", () => {
    onAll();
    saveState();
    renderToolbar();
    renderContent();
  });
  group.appendChild(allChip);

  options.forEach(opt => {
    const active = selected.includes(opt.value);
    const chip = document.createElement("button");
    chip.className = "chip" + (active ? " active" : "");
    if (opt.html) {
      chip.innerHTML = opt.html;
    } else {
      chip.textContent = opt.label;
    }
    if (active) chip.style.background = opt.color || "#323338";
    chip.addEventListener("click", () => {
      onToggle(opt.value);
      saveState();
      renderToolbar();
      renderContent();
    });
    group.appendChild(chip);
  });
}

function renderToolbar() {
  const searchInput = document.getElementById("searchInput");
  if (document.activeElement !== searchInput) {
    searchInput.value = state.ui.searchQuery;
  }
  searchInput.oninput = () => {
    state.ui.searchQuery = searchInput.value;
    saveState();
    renderContent();
  };

  const themeToggleBtn = document.getElementById("themeToggleBtn");
  themeToggleBtn.textContent = state.ui.theme === "dark" ? "☀️ Light Mode" : "🌙 Dark Mode";
  themeToggleBtn.onclick = () => {
    state.ui.theme = state.ui.theme === "dark" ? "light" : "dark";
    saveState();
    applyTheme();
  };

  const skinSelect = document.getElementById("skinSelect");
  skinSelect.innerHTML = THEMES.map(t => `<option value="${t.id}">${t.label}</option>`).join("");
  skinSelect.value = state.ui.skin;
  skinSelect.onchange = () => {
    state.ui.skin = skinSelect.value;
    saveState();
    applySkin();
    // Relabel the whole UI (Quests/To Do's, Hand/VIPs, tier marks, etc.).
    renderToolbar();
    renderMissionsPanel();
    renderNotesPanel();
    renderAll();
    if (openDetailId) renderDetail();
  };

  renderMultiChipGroup({
    containerId: "categoryChips",
    options: CATEGORIES.map(cat => ({ value: cat, label: cat, html: categoryIconHTML(cat) + " " + cat, color: CATEGORY_META[cat] })),
    getSelected: () => state.ui.categoryFilters,
    onToggle: (val) => toggleInArray(state.ui.categoryFilters, val),
    onAll: () => { state.ui.categoryFilters = CATEGORIES.slice(); }
  });

  renderMultiChipGroup({
    containerId: "statusChips",
    options: STAGES.map((stage, i) => ({ value: i, label: RANK_GLYPHS[i] + " " + stage.name, color: stage.color })),
    getSelected: () => state.ui.statusFilters,
    onToggle: (val) => toggleInArray(state.ui.statusFilters, val),
    onAll: () => { state.ui.statusFilters = STAGES.map((s, i) => i); }
  });

  document.getElementById("todoChipsLabel").textContent = T("todosLabel");
  document.getElementById("pileChipsLabel").textContent = T("pileGroupLabel");

  renderMultiChipGroup({
    containerId: "todoChips",
    options: [
      { value: "hasOpen", label: T("hasOpenTodos") },
      { value: "none", label: T("noTodos") }
    ],
    getSelected: () => state.ui.todoFilters,
    onToggle: (val) => toggleInArray(state.ui.todoFilters, val),
    onAll: () => { state.ui.todoFilters = ["hasOpen", "none"]; }
  });

  renderMultiChipGroup({
    containerId: "pileChips",
    options: pileOptionsForSkin(),
    getSelected: () => state.ui.pileFilters,
    onToggle: (val) => toggleInArray(state.ui.pileFilters, val),
    onAll: () => { state.ui.pileFilters = PILE_OPTIONS.map(o => o.value); }
  });

  const assigneeSelect = document.getElementById("assigneeFilterSelect");
  const assignees = knownAssignees();
  // If the selected assignee no longer exists, fall back to "all".
  if (state.ui.assigneeFilter !== "all" && state.ui.assigneeFilter !== "__unassigned__"
      && !assignees.includes(state.ui.assigneeFilter)) {
    state.ui.assigneeFilter = "all";
  }
  let assigneeOpts = '<option value="all">Assignee: Everyone</option>'
    + '<option value="__unassigned__">Unassigned</option>';
  assignees.forEach(a => {
    assigneeOpts += '<option value="' + a.replace(/"/g, "&quot;") + '">' + escapeHtml(a) + "</option>";
  });
  assigneeSelect.innerHTML = assigneeOpts;
  assigneeSelect.value = state.ui.assigneeFilter;
  assigneeSelect.onchange = () => {
    state.ui.assigneeFilter = assigneeSelect.value;
    saveState();
    renderContent();
  };

  const sortSelect = document.getElementById("sortSelect");
  sortSelect.innerHTML = `
    <option value="default">Sort: Default</option>
    <option value="name-asc">Name (A-Z)</option>
    <option value="name-desc">Name (Z-A)</option>
    <option value="status-asc">Status (early first)</option>
    <option value="status-desc">Status (late first)</option>
    <option value="todos-desc">${T("sortMostTodos")}</option>
    <option value="due-asc">Due date (soonest first)</option>
  `;
  sortSelect.value = state.ui.sortBy;
  sortSelect.onchange = () => {
    state.ui.sortBy = sortSelect.value;
    saveState();
    renderContent();
  };

  document.querySelectorAll("#viewToggle button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.view === state.ui.view);
    btn.onclick = () => {
      state.ui.view = btn.dataset.view;
      saveState();
      renderToolbar();
      renderContent();
    };
  });

  renderPresetsList();
  applyRoleUI();
}

const addBar = document.getElementById("addBar");
const addNameInput = document.getElementById("addNameInput");
const addCategorySelect = document.getElementById("addCategorySelect");

CATEGORIES.forEach(cat => {
  const opt = document.createElement("option");
  opt.value = cat;
  opt.textContent = cat;
  addCategorySelect.appendChild(opt);
});

function openAddBar() {
  if (!can("addProject")) return permissionDenied("Only admins can add projects.");
  addBar.classList.add("visible");
  addNameInput.value = "";
  addNameInput.focus();
}
document.getElementById("addProjectBtn").addEventListener("click", openAddBar);
document.getElementById("addCancelBtn").addEventListener("click", () => {
  addBar.classList.remove("visible");
});
function resetFilters() {
  state.ui.categoryFilters = CATEGORIES.slice();
  state.ui.statusFilters = STAGES.map((s, i) => i);
  state.ui.todoFilters = ["hasOpen", "none"];
  state.ui.pileFilters = ["deck"];
  state.ui.searchQuery = "";
  state.ui.sortBy = "default";
  state.ui.assigneeFilter = "all";
  state.ui.dueFilter = "all";
  saveState();
  renderToolbar();
  renderContent();
}

// Are any filters narrowing the list from the default view?
function filtersActive() {
  const u = state.ui;
  return (u.searchQuery || "").trim() !== ""
    || u.categoryFilters.length !== CATEGORIES.length
    || u.statusFilters.length !== STAGES.length
    || u.todoFilters.length !== 2
    || !(u.pileFilters.length === 1 && u.pileFilters[0] === "deck")
    || u.assigneeFilter !== "all"
    || u.dueFilter !== "all";
}
function countOverdue() {
  return state.projects.filter(p => roleCanSee(p) && getPile(p) !== "discard" && (dueInfo(projectDueDate(p)) || {}).state === "overdue").length;
}
function confirmAdd() {
  if (!can("addProject")) return permissionDenied("Only admins can add projects.");
  const name = addNameInput.value.trim();
  if (!name) return;
  const proj = newProject(name, addCategorySelect.value);
  state.projects.push(proj);
  logActivity('added project "' + name + '"', proj.id);
  saveState();
  addBar.classList.remove("visible");
  renderToolbar();
  renderAll();
  openDetail(proj.id);
}
document.getElementById("addConfirmBtn").addEventListener("click", confirmAdd);
addNameInput.addEventListener("keydown", e => { if (e.key === "Enter") confirmAdd(); });

/* ---------- Content (cards / table) ---------- */

function renderSummary() {
  const bar = document.getElementById("summaryBar");
  const visible = state.projects.filter(roleCanSee);
  const total = visible.length;
  const parts = [`<strong>${total}</strong> project${total === 1 ? "" : "s"}`];
  CATEGORIES.forEach(cat => {
    const count = visible.filter(p => p.category === cat).length;
    if (count > 0) {
      parts.push(`<span><span class="summary-dot" style="background:${CATEGORY_META[cat]}"></span>${cat} ${count}</span>`);
    }
  });
  const handCount = visible.filter(p => getPile(p) === "hand").length;
  if (handCount > 0) {
    parts.push(`<span>${T("handInline")(handCount)}</span>`);
  }
  bar.innerHTML = parts.map(p => `<span>${p}</span>`).join("");

  const overdue = countOverdue();
  if (overdue > 0) {
    const chip = document.createElement("span");
    chip.className = "summary-overdue";
    chip.textContent = "⚠ " + overdue + " overdue";
    chip.title = state.ui.dueFilter === "overdue" ? "Show all" : "Show only overdue";
    chip.addEventListener("click", () => {
      state.ui.dueFilter = state.ui.dueFilter === "overdue" ? "all" : "overdue";
      saveState();
      renderContent();
    });
    bar.appendChild(chip);
  }
}

function renderAll() {
  renderHandStrip();
  renderDiscardPile();
  renderStatsPanel();
  renderContent();
}

function setPile(proj, pile, sourceEl) {
  // Groups are personal (per-user) — anyone can organize their own view.
  if (pile === "hand") {
    const handCount = state.projects.filter(p => getPile(p) === "hand" && p.id !== proj.id).length;
    if (handCount >= HAND_LIMIT) {
      alert(T("handFull")(HAND_LIMIT));
      return;
    }
  }
  const isDrawing = pile === "hand" && getPile(proj) !== "hand";
  const startRect = (isDrawing && sourceEl) ? sourceEl.getBoundingClientRect() : null;
  setPileValue(proj, pile);
  saveState();
  renderAll();
  if (openDetailId === proj.id) renderDetail();
  if (startRect) animateDrawToHand(startRect, proj.id);
}

function animateDrawToHand(startRect, projId) {
  requestAnimationFrame(() => {
    const target = document.querySelector('.hand-card[data-id="' + projId + '"]');
    if (!target) return;
    const endRect = target.getBoundingClientRect();
    const clone = document.createElement("div");
    clone.className = "draw-fly-card";
    clone.textContent = "\u{1F0CF}";
    clone.style.left = startRect.left + "px";
    clone.style.top = startRect.top + "px";
    clone.style.width = startRect.width + "px";
    clone.style.height = startRect.height + "px";
    document.body.appendChild(clone);
    requestAnimationFrame(() => {
      clone.style.left = endRect.left + "px";
      clone.style.top = endRect.top + "px";
      clone.style.width = endRect.width + "px";
      clone.style.height = endRect.height + "px";
      clone.style.opacity = "0";
      clone.style.transform = "rotate(6deg)";
    });
    setTimeout(() => clone.remove(), 420);
  });
}

function appendCornerMarks(el) {
  ["tl", "tr", "bl", "br"].forEach(pos => {
    const mark = document.createElement("span");
    mark.className = "corner-mark " + pos;
    el.appendChild(mark);
  });
}

function renderHandStrip() {
  const wrap = document.getElementById("handStrip");
  wrap.innerHTML = "";
  appendCornerMarks(wrap);

  const header = document.createElement("div");
  header.className = "hand-strip-header";
  const title = document.createElement("h2");
  title.textContent = T("handTitle");
  header.appendChild(title);
  const handProjects = state.projects.filter(p => getPile(p) === "hand" && roleCanSee(p));
  const count = document.createElement("span");
  count.className = "hand-strip-count";
  count.textContent = handProjects.length + "/" + HAND_LIMIT;
  header.appendChild(count);
  wrap.appendChild(header);

  if (handProjects.length === 0) {
    const empty = document.createElement("div");
    empty.className = "hand-strip-empty";
    empty.innerHTML = '<div class="hand-strip-empty-icon">\u{1F0CF}</div>' + T("handEmpty");
    wrap.appendChild(empty);
    return;
  }

  const body = document.createElement("div");
  body.className = "hand-strip-body";
  handProjects.forEach(proj => {
    const card = document.createElement("div");
    card.className = "hand-card";
    card.dataset.id = proj.id;
    card.style.setProperty("--cat-color", CATEGORY_META[proj.category]);
    card.addEventListener("click", () => openDetail(proj.id));

    const h4 = document.createElement("h4");
    h4.textContent = proj.name;
    h4.dir = RTL_PATTERN.test(proj.name || "") ? "rtl" : "ltr";
    card.appendChild(h4);

    const handTypeline = document.createElement("div");
    handTypeline.className = "hand-card-typeline";
    handTypeline.appendChild(categoryTagEl(proj.category));
    handTypeline.appendChild(statusPillEl(proj.statusIndex));
    card.appendChild(handTypeline);

    const actions = document.createElement("div");
    actions.className = "hand-card-actions";
    const toDeckBtn = document.createElement("button");
    toDeckBtn.className = "btn secondary small-btn";
    toDeckBtn.textContent = isFantasy() ? "↩ Deck" : "↩ Projects";
    toDeckBtn.addEventListener("click", e => { e.stopPropagation(); setPile(proj, "deck"); });
    actions.appendChild(toDeckBtn);
    const discardBtn = document.createElement("button");
    discardBtn.className = "btn secondary small-btn";
    discardBtn.textContent = "\u{1F5D1}\u{FE0F}";
    discardBtn.addEventListener("click", e => { e.stopPropagation(); setPile(proj, "discard"); });
    actions.appendChild(discardBtn);
    card.appendChild(actions);

    body.appendChild(card);
  });
  wrap.appendChild(body);
}

function renderDiscardPile() {
  const wrap = document.getElementById("discardPile");
  wrap.innerHTML = "";
  const discarded = state.projects.filter(p => getPile(p) === "discard" && roleCanSee(p));

  const header = document.createElement("div");
  header.className = "discard-header";
  const chevron = document.createElement("span");
  chevron.className = "missions-chevron";
  chevron.textContent = state.ui.discardCollapsed ? "▸" : "▾";
  header.appendChild(chevron);
  const title = document.createElement("h2");
  title.textContent = T("discardTitle");
  header.appendChild(title);
  const count = document.createElement("span");
  count.className = "discard-count";
  count.textContent = discarded.length;
  header.appendChild(count);
  header.addEventListener("click", () => {
    state.ui.discardCollapsed = !state.ui.discardCollapsed;
    saveState();
    renderDiscardPile();
  });
  wrap.appendChild(header);

  if (state.ui.discardCollapsed) return;

  const body = document.createElement("div");
  body.className = "discard-body";
  if (discarded.length === 0) {
    const empty = document.createElement("div");
    empty.className = "missions-empty";
    empty.textContent = T("discardEmpty");
    body.appendChild(empty);
  } else {
    discarded.forEach(proj => {
      const row = document.createElement("div");
      row.className = "discard-row";

      const name = document.createElement("span");
      name.className = "discard-name";
      name.textContent = proj.name;
      applyBidi(name, proj.name);
      name.addEventListener("click", () => openDetail(proj.id));
      row.appendChild(name);
      row.appendChild(categoryTagEl(proj.category));

      const restoreBtn = document.createElement("button");
      restoreBtn.className = "btn secondary small-btn";
      restoreBtn.textContent = "↩ Restore";
      restoreBtn.addEventListener("click", () => setPile(proj, "deck"));
      row.appendChild(restoreBtn);

      // Permanent, global delete stays admin-only.
      if (can("deleteProject")) {
        const delBtn = document.createElement("button");
        delBtn.className = "icon-btn";
        delBtn.textContent = "🗑️ Delete forever";
        delBtn.addEventListener("click", () => deleteProject(proj.id));
        row.appendChild(delBtn);
      }

      body.appendChild(row);
    });
  }
  wrap.appendChild(body);
}

function renderFilterBar(shownCount) {
  const bar = document.createElement("div");
  bar.className = "filter-bar";
  const total = state.projects.filter(roleCanSee).length;
  const label = document.createElement("span");
  label.innerHTML = filtersActive()
    ? `Showing <span class="filter-count">${shownCount}</span> of ${total}`
    : `<span class="filter-count">${total}</span> project${total === 1 ? "" : "s"}`;
  bar.appendChild(label);
  if (filtersActive()) {
    const clear = document.createElement("button");
    clear.className = "clear-filters";
    clear.textContent = "✕ Clear all filters";
    clear.addEventListener("click", resetFilters);
    bar.appendChild(clear);
  }
  return bar;
}

function renderContent() {
  renderSummary();
  const content = document.getElementById("content");
  content.innerHTML = "";
  const projects = getFilteredProjects();

  content.appendChild(renderFilterBar(projects.length));

  if (projects.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    if (state.projects.length === 0) {
      empty.innerHTML = `
        <div class="empty-icon">🗂️</div>
        <h3>No projects yet</h3>
        <p>Create your first project to start tracking it.</p>
      `;
      const btn = document.createElement("button");
      btn.className = "btn";
      btn.textContent = "+ Add Project";
      btn.addEventListener("click", openAddBar);
      empty.appendChild(btn);
    } else {
      empty.innerHTML = `
        <div class="empty-icon">🔍</div>
        <h3>No projects match your filters</h3>
        <p>Try adjusting the search, category, status, or sort options.</p>
      `;
      const btn = document.createElement("button");
      btn.className = "btn secondary";
      btn.textContent = "Clear filters";
      btn.addEventListener("click", resetFilters);
      empty.appendChild(btn);
    }
    content.appendChild(empty);
    return;
  }

  if (state.ui.view === "cards") {
    content.appendChild(renderCardsView(projects));
  } else if (state.ui.view === "kanban") {
    content.appendChild(renderKanbanView(projects));
  } else {
    content.appendChild(renderTableView(projects));

/* Kanban board: one column per stage, drag cards between columns. */
let kanbanDragId = null;
function renderKanbanView(projects) {
  const board = document.createElement("div");
  board.className = "kanban-board";

  STAGES.forEach((stage, i) => {
    const col = document.createElement("div");
    col.className = "kanban-col";
    col.style.setProperty("--kanban-color", stage.color);

    const header = document.createElement("div");
    header.className = "kanban-col-header";
    const dot = document.createElement("span");
    dot.className = "kanban-dot";
    header.appendChild(dot);
    const label = document.createElement("span");
    label.textContent = stage.name;
    header.appendChild(label);
    const colProjects = projects.filter(p => p.statusIndex === i);
    const count = document.createElement("span");
    count.className = "kanban-col-count";
    count.textContent = colProjects.length;
    header.appendChild(count);
    col.appendChild(header);

    const body = document.createElement("div");
    body.className = "kanban-col-body";

    if (colProjects.length === 0) {
      const empty = document.createElement("div");
      empty.className = "kanban-empty";
      empty.textContent = "Drop here";
      body.appendChild(empty);
    }
    colProjects.forEach(proj => body.appendChild(renderKanbanCard(proj)));

    // Drag & drop onto this column changes status.
    col.addEventListener("dragover", e => { e.preventDefault(); col.classList.add("drag-over"); });
    col.addEventListener("dragleave", () => col.classList.remove("drag-over"));
    col.addEventListener("drop", e => {
      e.preventDefault();
      col.classList.remove("drag-over");
      if (!can("changeStatus")) return;
      const proj = state.projects.find(p => p.id === kanbanDragId);
      if (!proj || proj.statusIndex === i) return;
      proj.statusIndex = i;
      logActivity('set "' + proj.name + '" to ' + stage.name, proj.id);
      saveState();
      renderAll();
    });

    col.appendChild(body);
    board.appendChild(col);
  });

  return board;
}

function renderKanbanCard(proj) {
  const card = document.createElement("div");
  card.className = "kanban-card";
  const canDrag = can("changeStatus");
  card.draggable = canDrag;
  if (!canDrag) card.style.cursor = "pointer";
  card.style.setProperty("--cat-color", CATEGORY_META[proj.category]);

  if (canDrag) {
    card.addEventListener("dragstart", e => {
      kanbanDragId = proj.id;
      card.classList.add("dragging");
      if (e.dataTransfer) e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => { kanbanDragId = null; card.classList.remove("dragging"); });
  }
  card.addEventListener("click", () => openDetail(proj.id));

  const name = document.createElement("div");
  name.className = "kanban-card-name";
  name.textContent = proj.name;
  applyBidi(name, proj.name);
  card.appendChild(name);

  const row1 = document.createElement("div");
  row1.className = "kanban-card-row";
  row1.appendChild(categoryTagEl(proj.category));
  const doneCount = proj.todos.filter(t => t.done).length;
  const todoTag = document.createElement("span");
  todoTag.className = "assignee-unassigned";
  todoTag.textContent = "✅ " + doneCount + "/" + proj.todos.length;
  row1.appendChild(todoTag);
  card.appendChild(row1);

  const projDue = projectDueDate(proj);
  if (proj.assignee || projDue) {
    const row2 = document.createElement("div");
    row2.className = "kanban-card-row";
    if (proj.assignee) row2.appendChild(assigneeChipEl(proj.assignee));
    else { const sp = document.createElement("span"); sp.className = "assignee-unassigned"; sp.textContent = "Unassigned"; row2.appendChild(sp); }
    const due = dueBadgeEl(projDue);
    if (due) row2.appendChild(due);
    card.appendChild(row2);
  }

  return card;
}

const RANK_GLYPHS = ["○", "◔", "◑", "◕", "●"];
function statusPillEl(statusIndex) {
  const pill = document.createElement("span");
  pill.className = "status-pill";
  pill.style.background = STAGES[statusIndex].color;
  pill.textContent = RANK_GLYPHS[statusIndex] + " " + STAGES[statusIndex].name;
  return pill;
}

function categoryTagEl(category) {
  const tag = document.createElement("span");
  tag.className = "tag";
  tag.style.background = CATEGORY_META[category] + "22";
  tag.style.color = CATEGORY_META[category];
  tag.innerHTML = categoryIconHTML(category) + " " + category;
  return tag;
}

const TIER_META = {
  common: null,
  rare: { label: "★ Rare" },
  epic: { label: "★★ Epic" },
  legendary: { label: "★★★ Legendary" }
};
function getCardTier(proj) {
  const openTodos = proj.todos.filter(t => !t.done).length;
  const isPerfect = openTodos === 0 && proj.todos.length > 0;
  if (proj.statusIndex === STAGES.length - 1 && isPerfect) return "legendary";
  if (proj.statusIndex >= STAGES.length - 2) return "epic";
  if (proj.statusIndex >= 2) return "rare";
  return "common";
}

    const header = document.createElement("div");
    header.className = "card-header";

    art.className = "card-art";
    art.innerHTML = categoryIconHTML(proj.category);

    if (isFantasy() && TIER_META[tier]) {
      const tierBanner = document.createElement("div");

      <span class="rule-line">✅ ${doneCount}/${proj.todos.length} ${T("todosWord")} complete</span>

      fill.style.width = pct + "%";

    const projDue = projectDueDate(proj);

      else { const sp = document.createElement("span"); sp.className = "assignee-unassigned"; sp.textContent = "Unassigned"; meta.appendChild(sp); }

      tooltipTitle.className = "card-quest-tooltip-title";
      tooltipTitle.textContent = T("tooltipTitle");
      tooltip.appendChild(tooltipTitle);

        const li = document.createElement("li");
        li.className = t.done ? "done" : "";
        const mark = document.createElement("span");
        mark.className = "check-mark";
        mark.textContent = t.done ? "\u{2705}" : "\u{2B1C}";
        li.appendChild(mark);
        const label = document.createElement("span");
        let labelText = t.text;
        if (t.subs && t.subs.length) {
          const d = t.subs.filter(s => s.done).length;
          labelText += "  (" + d + "/" + t.subs.length + ")";
        }
        label.textContent = labelText;
        applyBidi(label, t.text);
        li.appendChild(label);
        tooltipList.appendChild(li);
      });
      tooltip.appendChild(tooltipList);
      card.appendChild(tooltip);
    }

    const leftBadge = document.createElement("div");
    leftBadge.className = "card-stat-badge left";
    leftBadge.textContent = `${doneCount}/${proj.todos.length}`;
    card.appendChild(leftBadge);

    grid.appendChild(card);
  });

  // TCG-style 3D tilt toward the cursor (skipped for reduced-motion users).
  if (!REDUCED_MOTION) {
    grid.addEventListener("mousemove", e => {
      const card = e.target.closest(".project-card");
      if (!card || !grid.contains(card)) return;
      const r = card.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width - 0.5;
      const py = (e.clientY - r.top) / r.height - 0.5;
      card.style.transform =
        "translateY(-4px) scale(1.015) rotateX(" + (-py * 7).toFixed(2) + "deg) rotateY(" + (px * 7).toFixed(2) + "deg)";
    });
    grid.addEventListener("mouseout", e => {
      const card = e.target.closest(".project-card");
      if (card && !card.contains(e.relatedTarget)) card.style.transform = "";
    });
  }
  return grid;
}

function deleteProject(id) {
  if (!can("deleteProject")) return permissionDenied("Only admins can delete projects.");
  const proj = state.projects.find(p => p.id === id);
  if (!proj) return;
  if (confirm(`Permanently trash "${proj.name}"? This cannot be undone.`)) {
    state.projects = state.projects.filter(p => p.id !== id);
    logActivity('permanently deleted "' + proj.name + '"', id);
    saveState();
    renderToolbar();
    if (openDetailId === id) {
      closeDetail();
    } else {
      renderAll();
    }
  }
}

// Moves the project to the current user's own "Irrelevant" group (personal).
function trashCard(id) {
  const proj = state.projects.find(p => p.id === id);
  if (!proj) return;
  const previousPile = getPile(proj);
  if (previousPile === "discard") return; // already there
  const name = proj.name;
  setPileValue(proj, "discard");
  saveState();
  renderAll();
  if (openDetailId === id) renderDetail();
  showUndoToast(T("sentToDiscard")(name), () => {
    const p = state.projects.find(pp => pp.id === id);
    if (!p) return;
    setPileValue(p, previousPile);
    saveState();
    renderAll();
    if (openDetailId === id) renderDetail();
  });
}

function showUndoToast(message, onUndo) {
  const container = document.getElementById("toastContainer");
  const toast = document.createElement("div");
  toast.className = "toast";

  const msg = document.createElement("span");
  msg.textContent = message;
  toast.appendChild(msg);

  const undoBtn = document.createElement("button");
  undoBtn.className = "toast-undo";
  undoBtn.textContent = "Undo";
  toast.appendChild(undoBtn);

  let dismissed = false;
  const timer = setTimeout(() => dismiss(), 6000);
  function dismiss() {
    if (dismissed) return;
    dismissed = true;
    clearTimeout(timer);
    toast.remove();
  }
  undoBtn.addEventListener("click", () => {
    dismiss();
    onUndo();
  });

  container.appendChild(toast);
}

function exportBackup() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `project-tracker-backup-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importBackup(file) {
  if (!can("import")) return permissionDenied("Only admins can import a backup.");
  const reader = new FileReader();
  reader.onload = () => {
    let parsed;
    try {
      parsed = JSON.parse(reader.result);
    } catch (e) {
      alert("That file is not valid JSON and could not be imported.");
      return;
    }
    if (!parsed || typeof parsed !== "object" || !Array.isArray(parsed.projects)) {
      alert("That file doesn't look like a Project Tracker backup.");
      return;
    }
    if (!confirm("Importing will replace ALL current projects, missions, and notes with the contents of this backup. This cannot be undone. Continue?")) {
      return;
    }
    state = migrateState(parsed);
    saveState();
    closeDetail();
    renderToolbar();
    renderMissionsPanel();
    renderNotesPanel();
    renderActivityPanel();
    renderAll();
    alert("Backup imported successfully.");
  };
  reader.onerror = () => alert("Could not read that file.");
  reader.readAsText(file);
}

document.getElementById("exportBtn").addEventListener("click", exportBackup);
document.getElementById("importBtn").addEventListener("click", () => {
  document.getElementById("importFileInput").click();
});
document.getElementById("importFileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) importBackup(file);
  e.target.value = "";
});

const detailOverlay = document.getElementById("detailOverlay");
const detailTitle = document.getElementById("detailTitle");
const detailBody = document.getElementById("detailBody");

document.getElementById("detailCloseBtn").addEventListener("click", closeDetail);
document.getElementById("detailDeleteBtn").addEventListener("click", () => {

});

detailTitle.addEventListener("input", () => {
  const proj = state.projects.find(p => p.id === openDetailId);

detailTitle.addEventListener("blur", () => {

  if (!proj || !can("editProject", proj)) return;
  proj.name = detailTitle.value.trim() || "Untitled Project";

function openDetail(id) {

function renderPileControl(proj) {
  const box = document.createElement("div");
  box.className = "pile-control";
  const label = document.createElement("span");
  label.className = "pile-control-label";
  label.textContent = isFantasy() ? "Pile:" : "Group:";
  box.appendChild(label);
  const cur = getPile(proj);
  pileOptionsForSkin().forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "chip" + (cur === opt.value ? " active" : "");
    btn.textContent = opt.label;
    if (cur === opt.value) btn.style.background = "#323338";
    btn.addEventListener("click", (e) => setPile(proj, opt.value, e.currentTarget));
    box.appendChild(btn);
  });

}

function renderDetail() {
  const proj = state.projects.find(p => p.id === openDetailId);
  if (!proj) { closeDetail(); return; }

  const panel = document.getElementById("detailPanel");
  const catColor = CATEGORY_META[proj.category];
  panel.style.setProperty("--modal-accent", catColor);
  panel.style.setProperty("--modal-accent-soft", catColor + "33");
  document.getElementById("detailCatIcon").innerHTML = categoryIconHTML(proj.category);

  const tier = getCardTier(proj);
  const ribbon = document.getElementById("detailTierRibbon");
  if (isFantasy() && TIER_META[tier]) {
    ribbon.textContent = TIER_META[tier].label;
    ribbon.className = "modal-tier-ribbon visible tier-" + tier;
  } else {
    ribbon.textContent = "";
    ribbon.className = "modal-tier-ribbon";
  }
  const delBtn = document.getElementById("detailDeleteBtn");
  delBtn.textContent = "🗑️ Delete forever";
  delBtn.style.display = can("deleteProject") ? "" : "none";

  detailTitle.value = proj.name;
  detailTitle.readOnly = !can("editProject", proj);
  applyBidi(detailTitle, proj.name);
  detailBody.innerHTML = "";
  detailBody.appendChild(renderStepper(proj));
  // Groups (Projects/VIP/Irrelevant) are personal — everyone gets the control.
  detailBody.appendChild(renderPileControl(proj));

  const stack = document.createElement("div");
  stack.className = "detail-stack";
  if (can("editProject", proj)) stack.appendChild(renderAssignmentBox(proj));
  stack.appendChild(renderQuestLog(proj));
  stack.appendChild(renderProjectNotesBox(proj));
  stack.appendChild(renderMapBox(proj));
  stack.appendChild(renderCommentsBox(proj));
  stack.appendChild(renderProjectHistoryBox(proj));
  detailBody.appendChild(stack);
}

function renderCommentsBox(proj) {
  const box = document.createElement("div");
  box.className = "section-box";
  const editable = can("editComments");
  const h4 = document.createElement("h4");
  h4.textContent = "💬 Comments";
  box.appendChild(h4);

  if (!Array.isArray(proj.comments)) proj.comments = [];

  if (proj.comments.length) {
    const list = document.createElement("div");
    list.className = "comment-list";
    proj.comments.slice().reverse().forEach((c) => {
      const realIdx = proj.comments.indexOf(c);
      const el = document.createElement("div");
      el.className = "comment";
      const head = document.createElement("div");
      head.className = "comment-head";
      const user = document.createElement("span");
      user.className = "comment-user";
      user.textContent = c.user || "Someone";
      head.appendChild(user);
      const time = document.createElement("span");
      time.className = "comment-time";
      time.textContent = timeAgo(c.ts);
      time.title = new Date(c.ts).toLocaleString();
      head.appendChild(time);
      if (editable) {
        const del = document.createElement("button");
        del.className = "comment-delete";
        del.textContent = "✕";
        del.title = "Delete comment";
        del.setAttribute("aria-label", "Delete comment");
        del.addEventListener("click", () => { proj.comments.splice(realIdx, 1); persistAndRefresh(); });
        head.appendChild(del);
      }
      el.appendChild(head);
      const body = document.createElement("div");
      body.className = "comment-body";
      body.textContent = c.text;
      applyBidi(body, c.text);
      el.appendChild(body);
      list.appendChild(el);
    });
    box.appendChild(list);
  }

  if (editable) {
    const inputRow = document.createElement("div");
    inputRow.className = "item-input";
    const ta = document.createElement("textarea");
    ta.className = "note-input";
    ta.rows = 2;
    ta.placeholder = "Write a comment...";
    ta.dir = "auto";
    const addBtn = document.createElement("button");
    addBtn.className = "btn small-btn";
    addBtn.textContent = "Post";
    function addComment() {
      const v = ta.value.trim();
      if (!v) return;
      proj.comments.push({ user: currentUserLabel, text: v, ts: Date.now() });
      ta.value = "";
      persistAndRefresh();
    }
    addBtn.addEventListener("click", addComment);
    ta.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); addComment(); } });
    inputRow.appendChild(ta);
    inputRow.appendChild(addBtn);
    box.appendChild(inputRow);
  } else if (proj.comments.length === 0) {
    const empty = document.createElement("div");
    empty.className = "missions-empty";
    empty.textContent = "No comments yet.";
    box.appendChild(empty);
  }

  return box;
}

function buildNoteEntry(note, refresh, remove, editable) {
  if (editable === undefined) editable = true;
  const entry = document.createElement("div");
  entry.className = "note-entry";

  const icon = document.createElement("span");
  icon.className = "note-icon";
  icon.textContent = "\u{1F4DC}";
  entry.appendChild(icon);

  const text = document.createElement("div");
  text.className = "note-text" + (editable ? " editable" : "");
  if (editable) text.title = "Click to edit";
  text.textContent = note.text;
  applyBidi(text, note.text);
  if (editable) text.addEventListener("click", () => {
    const textarea = document.createElement("textarea");
    textarea.className = "note-edit-input";
    textarea.value = note.text;
    textarea.dir = "auto";
    textarea.rows = Math.max(2, note.text.split("\n").length);
    entry.replaceChild(textarea, text);
    textarea.focus();
    textarea.select();
    let finished = false;
    function finish(shouldSave) {
      if (finished) return;
      finished = true;
      const val = textarea.value.trim();
      if (shouldSave && val && val !== note.text) {
        note.text = val;
        refresh();
      } else if (textarea.parentNode === entry) {
        entry.replaceChild(text, textarea);
      }
    }
    textarea.addEventListener("blur", () => finish(true));
    textarea.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); finish(true); }
      else if (e.key === "Escape") { e.preventDefault(); finished = true; entry.replaceChild(text, textarea); }
    });
  });
  entry.appendChild(text);

  if (editable) {
    const delBtn = document.createElement("button");
    delBtn.className = "note-delete";
    delBtn.title = "Delete note";
    delBtn.setAttribute("aria-label", "Delete note");
    delBtn.textContent = "✕";
    delBtn.addEventListener("click", remove);
    entry.appendChild(delBtn);
  }

  return entry;
}

const collapsedQuests = new WeakSet();

function renderQuestCard(proj, quest, idx) {
  const editable = canEditTodos(proj);
  const card = document.createElement("div");
  const collapsed = collapsedQuests.has(quest);
  card.className = "quest-card" + (quest.done ? " done" : "") + (collapsed ? " collapsed" : "");

  const head = document.createElement("div");
  head.className = "quest-card-head";

  const chevron = document.createElement("button");
  chevron.type = "button";
  chevron.className = "quest-chevron";
  chevron.textContent = collapsed ? "▸" : "▾";
  chevron.title = collapsed ? "Expand quest" : "Collapse quest";
  chevron.addEventListener("click", (e) => {
    e.stopPropagation();
    if (collapsedQuests.has(quest)) {
      collapsedQuests.delete(quest);
      card.classList.remove("collapsed");
      chevron.textContent = "▾";
      chevron.title = "Collapse quest";
    } else {
      collapsedQuests.add(quest);
      card.classList.add("collapsed");
      chevron.textContent = "▸";
      chevron.title = "Expand quest";
    }
  });
  head.appendChild(chevron);

  const toggle = document.createElement("button");
  toggle.type = "button";
  toggle.className = "entry-toggle quest-seal";
  toggle.setAttribute("aria-label", quest.done ? "Mark incomplete" : "Mark complete");
  toggle.textContent = quest.done ? "✓" : "";
  if (editable) {
    toggle.addEventListener("click", () => {
      quest.done = !quest.done;
      logActivity((quest.done ? "completed " : "reopened ") + (isFantasy() ? "quest" : "to-do") + ' "' + quest.text + '" on "' + proj.name + '"', proj.id);
      persistAndRefresh();
    });
  } else {
    toggle.disabled = true;
    toggle.style.cursor = "default";
  }
  head.appendChild(toggle);

  const name = document.createElement("span");
  name.className = "quest-name text" + (editable ? " editable" : "");
  name.textContent = quest.text;
  applyBidi(name, quest.text);
  if (editable) {
    name.title = "Click to edit quest name";
    name.addEventListener("click", () =>
      startInlineEdit(head, name, quest.text, (v) => { quest.text = v; persistAndRefresh(); })
    );
  }
  head.appendChild(name);

  if (quest.subs.length) {
    const done = quest.subs.filter(s => s.done).length;
    if (quest.subs.length <= 10) {
      const pips = document.createElement("span");
      pips.className = "quest-pips";
      quest.subs.forEach(s => {
        const pip = document.createElement("span");
        pip.className = "quest-pip" + (s.done ? " done" : "");
        pips.appendChild(pip);
      });
      head.appendChild(pips);
    }
    const prog = document.createElement("span");
    prog.className = "quest-sub-count";
    prog.textContent = done + "/" + quest.subs.length;
    head.appendChild(prog);
  }

  // Assignee avatar + due badge shown compactly in the head.
  const headBadges = document.createElement("span");
  headBadges.className = "quest-head-badges";
  if (quest.assignee) {
    const av = document.createElement("span");
    av.className = "assignee-avatar";
    av.style.background = assigneeColor(quest.assignee);
    av.textContent = assigneeInitials(quest.assignee);
    av.title = quest.assignee;
    headBadges.appendChild(av);
  }
  if (quest.dueDate) {
    const due = dueBadgeEl(quest.dueDate);
    if (due) headBadges.appendChild(due);
  }
  if (headBadges.childNodes.length) head.appendChild(headBadges);

  if (editable) {
    const del = document.createElement("button");
    del.className = "entry-delete";
    del.title = "Delete quest";
    del.setAttribute("aria-label", "Delete quest");
    del.textContent = "✕";
    del.addEventListener("click", () => {
      logActivity('removed ' + (isFantasy() ? "quest" : "to-do") + ' "' + quest.text + '" from "' + proj.name + '"', proj.id);
      proj.todos.splice(idx, 1);
      persistAndRefresh();
    });
    head.appendChild(del);
  }

  card.appendChild(head);

  const desc = document.createElement("div");
  desc.className = "quest-desc" + (editable ? " editable" : "") + (quest.description ? "" : " empty");
  desc.textContent = quest.description || (editable ? "Add a description..." : "No description.");
  if (quest.description) applyBidi(desc, quest.description);
  if (editable) {
  desc.title = "Click to edit description";
  desc.addEventListener("click", () => {
    const ta = document.createElement("textarea");
    ta.className = "note-edit-input";
    ta.value = quest.description || "";
    ta.dir = "auto";
    ta.rows = Math.max(2, (quest.description || "").split("\n").length);
    card.replaceChild(ta, desc);
    ta.focus();
    let finished = false;
    function finish(shouldSave) {
      if (finished) return;
      finished = true;
      if (shouldSave) { quest.description = ta.value.trim(); persistAndRefresh(); }
      else if (ta.parentNode === card) { card.replaceChild(desc, ta); }
    }
    ta.addEventListener("blur", () => finish(true));
    ta.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); finish(true); }
      else if (e.key === "Escape") { e.preventDefault(); finished = true; card.replaceChild(desc, ta); }
    });
  });
  }
  card.appendChild(desc);

  // Assignee + due date for this to-do (editable only).
  if (editable) {
  const meta = document.createElement("div");
  meta.className = "quest-meta";
  const qAssignee = document.createElement("input");
  qAssignee.type = "text";
  qAssignee.placeholder = "👤 Assignee";
  qAssignee.value = quest.assignee || "";
  qAssignee.setAttribute("list", "assigneeOptions");
  applyBidi(qAssignee, qAssignee.value);
  function commitQAssignee() {
    const v = qAssignee.value.trim();
    if (v === (quest.assignee || "")) return;
    quest.assignee = v;
    logActivity((v ? ('assigned ' + (isFantasy() ? "quest" : "to-do") + ' "' + quest.text + '" to ' + v)
                   : ('unassigned ' + (isFantasy() ? "quest" : "to-do") + ' "' + quest.text + '"')) + ' on "' + proj.name + '"', proj.id);
    persistAndRefresh();
    renderToolbar();
  }
  qAssignee.addEventListener("change", commitQAssignee);
  qAssignee.addEventListener("blur", commitQAssignee);
  qAssignee.addEventListener("keydown", e => { if (e.key === "Enter") qAssignee.blur(); });
  meta.appendChild(qAssignee);

  const qDue = document.createElement("input");
  qDue.type = "date";
  qDue.value = quest.dueDate || "";
  qDue.title = "Due date";
  qDue.addEventListener("change", () => {
    const v = qDue.value || "";
    if (v === (quest.dueDate || "")) return;
    quest.dueDate = v;
    logActivity((v ? ('set due date for ' + (isFantasy() ? "quest" : "to-do") + ' "' + quest.text + '" to ' + v)
                   : ('cleared due date for ' + (isFantasy() ? "quest" : "to-do") + ' "' + quest.text + '"')) + ' on "' + proj.name + '"', proj.id);
    persistAndRefresh();
  });
  meta.appendChild(qDue);
  card.appendChild(meta);
  }

  const subs = document.createElement("div");
  subs.className = "quest-subs";

  if (quest.subs.length) {
    const subList = document.createElement("ul");
    subList.className = "item-list quest-sub-list";
    quest.subs.forEach((sub, sIdx) => {
      subList.appendChild(createEntryItem(
        sub,
        "var(--accent)",
        editable ? () => { sub.done = !sub.done; persistAndRefresh(); } : null,
        editable ? () => { quest.subs.splice(sIdx, 1); persistAndRefresh(); } : null,
        editable ? (v) => { sub.text = v; persistAndRefresh(); } : null
      ));
    });
    subs.appendChild(subList);
  }

  if (editable) {
    const subInputRow = document.createElement("div");
    subInputRow.className = "item-input quest-sub-input";
    const subInput = document.createElement("input");
    subInput.type = "text";
    subInput.placeholder = T("subAdd");
    subInput.dir = "auto";
    const subAdd = document.createElement("button");
    subAdd.className = "btn secondary small-btn";
    subAdd.textContent = "+ Sub";
    function addSub() {
      const val = subInput.value.trim();
      if (!val) return;
      quest.subs.push({ text: val, done: false });
      subInput.value = "";
      persistAndRefresh();
    }
    subAdd.addEventListener("click", addSub);
    subInput.addEventListener("keydown", e => { if (e.key === "Enter") addSub(); });
    subInputRow.appendChild(subInput);
    subInputRow.appendChild(subAdd);
    subs.appendChild(subInputRow);
  }

  card.appendChild(subs);
  return card;
}

function createEntryItem(item, accentVar, onToggle, onDelete, onEdit) {
  const li = document.createElement("li");
  li.className = "entry-item" + (item.done ? " done" : "");
  li.style.setProperty("--entry-accent", accentVar);

  const toggle = document.createElement("button");
  toggle.type = "button";
  toggle.className = "entry-toggle";
  toggle.setAttribute("aria-label", item.done ? "Mark incomplete" : "Mark complete");
  toggle.textContent = item.done ? "✓" : "";
  if (onToggle) toggle.addEventListener("click", onToggle);
  else { toggle.disabled = true; toggle.style.cursor = "default"; }
  li.appendChild(toggle);

  const span = document.createElement("span");
  span.className = "text";
  span.textContent = item.text;
  applyBidi(span, item.text);
  if (onEdit) {
    span.title = "Click to edit";
    span.classList.add("editable");
    span.addEventListener("click", () => startInlineEdit(li, span, item.text, onEdit));
  }
  li.appendChild(span);

  if (onDelete) {
    const delBtn = document.createElement("button");
    delBtn.className = "entry-delete";
    delBtn.title = "Delete";
    delBtn.setAttribute("aria-label", "Delete");
    delBtn.textContent = "✕";
    delBtn.addEventListener("click", onDelete);
    li.appendChild(delBtn);
  }

  return li;
}

function startInlineEdit(container, displayEl, currentText, onSave) {
  const input = document.createElement("input");
  input.type = "text";
  input.className = "entry-edit-input";
  input.value = currentText;
  input.dir = "auto";
  container.replaceChild(input, displayEl);
  input.focus();
  input.select();

  let finished = false;
  function finish(shouldSave) {
    if (finished) return;
    finished = true;
    const val = input.value.trim();
    if (shouldSave && val && val !== currentText) {
      onSave(val);
    } else if (input.parentNode === container) {
      container.replaceChild(displayEl, input);
    }
  }
  input.addEventListener("blur", () => finish(true));
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); finish(true); }
    else if (e.key === "Escape") { e.preventDefault(); finished = true; container.replaceChild(displayEl, input); }
  });
}

  panel.innerHTML = "";
  if (isTodoEditor()) { panel.style.display = "none"; return; }
  panel.style.display = "";
  appendCornerMarks(panel);

  const header = document.createElement("div");
  header.className = "missions-header";

  const chevron = document.createElement("span");
  chevron.className = "missions-chevron";
  chevron.textContent = state.ui.statsCollapsed ? "▸" : "▾";
  header.appendChild(chevron);

  const title = document.createElement("h2");
  title.textContent = T("statsTitle");
  header.appendChild(title);

  const countBadge = document.createElement("span");
  countBadge.className = "missions-count";
  countBadge.textContent = state.projects.length + " total";
  header.appendChild(countBadge);

  header.addEventListener("click", () => {
    state.ui.statsCollapsed = !state.ui.statsCollapsed;
    saveState();
    renderStatsPanel();
  });
  panel.appendChild(header);

  if (state.ui.statsCollapsed) return;

  const body = document.createElement("div");
  body.className = "stats-body";
  const total = state.projects.length;

  function statBar(label, segments) {
    const row = document.createElement("div");
    row.className = "stats-row";

    const rowLabel = document.createElement("div");
    rowLabel.className = "stats-row-label";
    rowLabel.textContent = label;
    row.appendChild(rowLabel);

    const bar = document.createElement("div");
    bar.className = "stats-bar";
    segments.forEach(seg => {
      if (seg.count <= 0) return;
      const fill = document.createElement("div");
      fill.className = "stats-bar-fill";
      fill.style.width = (total ? (seg.count / total * 100) : 0) + "%";
      fill.style.background = seg.color;
      fill.title = seg.label + ": " + seg.count;
      bar.appendChild(fill);
    });
    row.appendChild(bar);

    const legend = document.createElement("div");
    legend.className = "stats-legend";
    legend.innerHTML = segments.filter(s => s.count > 0).map(s =>
      `<span><span class="stats-dot" style="background:${s.color}"></span>${s.label} ${s.count}</span>`
    ).join("");
    row.appendChild(legend);

    return row;
  }

  if (total === 0) {
    const empty = document.createElement("div");
    empty.className = "missions-empty";
    empty.textContent = "No projects yet — add one to see stats.";
    body.appendChild(empty);
  } else {
    body.appendChild(statBar("Kind", CATEGORIES.map(cat => ({
      label: cat,
      count: state.projects.filter(p => p.category === cat).length,
      color: CATEGORY_META[cat]
    }))));

    body.appendChild(statBar("Status", STAGES.map((s, i) => ({
      label: s.name,
      count: state.projects.filter(p => p.statusIndex === i).length,
      color: s.color
    }))));

    const pileColors = { deck: "#0073ea", hand: "#fdab3d", discard: "#676879" };
    body.appendChild(statBar(isFantasy() ? "Pile" : "Group", pileOptionsForSkin().map(o => ({
      label: o.label.replace(/^\S+\s/, ""),
      count: state.projects.filter(p => getPile(p) === o.value).length,
      color: pileColors[o.value]
    }))));

    const totalTodos = state.projects.reduce((sum, p) => sum + p.todos.length, 0);
    const doneTodos = state.projects.reduce((sum, p) => sum + p.todos.filter(t => t.done).length, 0);
    const totalNotes = state.projects.reduce((sum, p) => sum + p.notes.length, 0);

    const summaryRow = document.createElement("div");
    summaryRow.className = "stats-summary-row";
    summaryRow.innerHTML = `
      <span>${T("statsTodos")}: <strong>${doneTodos}/${totalTodos}</strong> complete</span>
      <span>\u{1F4DC} Notes: <strong>${totalNotes}</strong></span>
    `;
    body.appendChild(summaryRow);
  }

  panel.appendChild(body);
}

function renderActivityPanel() {
  const panel = document.getElementById("activityPanel");
  if (!panel) return;
  panel.innerHTML = "";
  appendCornerMarks(panel);

  const header = document.createElement("div");
  header.className = "missions-header";

  const chevron = document.createElement("span");
  chevron.className = "missions-chevron";
  chevron.textContent = state.ui.activityCollapsed ? "▸" : "▾";
  header.appendChild(chevron);

  const title = document.createElement("h2");
  title.textContent = "🕰️ Activity";
  header.appendChild(title);

  const countBadge = document.createElement("span");
  countBadge.className = "missions-count";
  countBadge.textContent = state.activity.length + " logged";
  header.appendChild(countBadge);

  header.addEventListener("click", () => {
    state.ui.activityCollapsed = !state.ui.activityCollapsed;
    saveState();
    renderActivityPanel();
  });
  panel.appendChild(header);

  if (state.ui.activityCollapsed) return;

  const body = document.createElement("div");
  body.className = "missions-body";

  if (state.activity.length === 0) {
    const empty = document.createElement("div");
    empty.className = "missions-empty";
    empty.textContent = "No activity yet. Changes you and your team make will show up here.";
    body.appendChild(empty);
  } else {
    const userFilter = state.ui.activityUserFilter || "all";

    // "Filter by user" dropdown.
    const users = [...new Set(state.activity.map(a => a.user || "Someone"))].sort((a, b) => a.localeCompare(b));
    const filterRow = document.createElement("div");
    filterRow.className = "item-input";
    filterRow.style.marginBottom = "10px";
    const sel = document.createElement("select");
    sel.className = "status-filter";
    sel.innerHTML = '<option value="all">Everyone</option>' +
      users.map(u => `<option value="${escapeHtml(u)}">${escapeHtml(u)}</option>`).join("");
    sel.value = users.includes(userFilter) ? userFilter : "all";
    sel.addEventListener("change", () => {
      state.ui.activityUserFilter = sel.value;
      saveState();
      renderActivityPanel();
    });
    const lbl = document.createElement("span");
    lbl.className = "stats-row-label";
    lbl.style.alignSelf = "center";
    lbl.textContent = "By user:";
    filterRow.appendChild(lbl);
    filterRow.appendChild(sel);
    body.appendChild(filterRow);

    const entries = state.activity.filter(a => userFilter === "all" || (a.user || "Someone") === userFilter);

    const list = document.createElement("div");
    list.className = "activity-list";
    if (entries.length === 0) {
      const none = document.createElement("div");
      none.className = "missions-empty";
      none.textContent = "No activity from " + userFilter + ".";
      list.appendChild(none);
    }
    // Newest first.
    entries.slice().reverse().forEach(entry => {
      const row = document.createElement("div");
      row.className = "activity-entry";
      const user = document.createElement("span");
      user.className = "activity-user";
      user.textContent = entry.user || "Someone";
      row.appendChild(user);
      const text = document.createElement("span");
      text.className = "activity-text";
      text.textContent = entry.text;
      // Keep the line LTR (English structure); embedded RTL names still render.
      text.dir = "ltr";
      row.appendChild(text);
      const time = document.createElement("span");
      time.className = "activity-time";
      time.textContent = timeAgo(entry.ts);
      time.title = new Date(entry.ts).toLocaleString();
      row.appendChild(time);
      list.appendChild(row);
    });
    body.appendChild(list);

    if (can("clearActivity")) {
      const clearRow = document.createElement("div");
      clearRow.className = "activity-clear";
      const clearBtn = document.createElement("button");
      clearBtn.className = "btn secondary small-btn";
      clearBtn.textContent = "Clear activity log";
      clearBtn.addEventListener("click", () => {
        if (!confirm("Clear the activity log for everyone? This cannot be undone.")) return;
        state.activity = [];
        saveState();
        renderActivityPanel();
      });
      clearRow.appendChild(clearBtn);
      body.appendChild(clearRow);
    }
  }

  panel.appendChild(body);
}

function renderNotesPanel() {
  const panel = document.getElementById("notesPanel");
  panel.innerHTML = "";
  if (isTodoEditor()) { panel.style.display = "none"; return; }
  panel.style.display = "";
  appendCornerMarks(panel);

  const header = document.createElement("div");
  header.className = "missions-header";

  const chevron = document.createElement("span");
  chevron.className = "missions-chevron";
  chevron.textContent = state.ui.notesCollapsed ? "▸" : "▾";
  header.appendChild(chevron);

  const title = document.createElement("h2");
  title.textContent = "\u{1F4DC} General Notes";
  header.appendChild(title);

  const countBadge = document.createElement("span");
  countBadge.className = "missions-count";
  countBadge.textContent = state.generalNotes.length + (state.generalNotes.length === 1 ? " note" : " notes");
  header.appendChild(countBadge);

  header.addEventListener("click", () => {
    state.ui.notesCollapsed = !state.ui.notesCollapsed;
    saveState();
    renderNotesPanel();
  });
  panel.appendChild(header);

  if (state.ui.notesCollapsed) return;

  const body = document.createElement("div");
  body.className = "missions-body";
  const editable = can("editGeneral");

  if (editable) {
    const inputRow = document.createElement("div");
    inputRow.className = "item-input";
    const textarea = document.createElement("textarea");
    textarea.className = "note-input";
    textarea.rows = 2;
    textarea.placeholder = "Write a note...";
    textarea.dir = "auto";
    const addBtn = document.createElement("button");
    addBtn.className = "btn small-btn";
    addBtn.textContent = "Add";
    function addNote() {
      const val = textarea.value.trim();
      if (!val) return;
      state.generalNotes.push({ text: val });
      textarea.value = "";
      saveState();
      renderNotesPanel();
    }
    addBtn.addEventListener("click", addNote);
    textarea.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); addNote(); }
    });
    inputRow.appendChild(textarea);
    inputRow.appendChild(addBtn);
    body.appendChild(inputRow);
  }

  if (state.generalNotes.length === 0) {
    const empty = document.createElement("div");
    empty.className = "missions-empty";
    empty.textContent = "\u{1F4DC} No notes yet.";
    body.appendChild(empty);
  } else {
    const list = document.createElement("div");
    list.className = "notes-list";
    state.generalNotes.forEach((note, idx) => {
      list.appendChild(buildNoteEntry(
        note,
        () => { saveState(); renderNotesPanel(); },
        () => { state.generalNotes.splice(idx, 1); saveState(); renderNotesPanel(); },
        editable
      ));
    });
    body.appendChild(list);
  }

  panel.appendChild(body);
}

function renderPresetsList() {
  const list = document.getElementById("presetList");
  list.innerHTML = "";
  if (state.filterPresets.length === 0) {
    const empty = document.createElement("span");
    empty.className = "preset-empty";
    empty.textContent = "No saved presets yet.";
    list.appendChild(empty);
    return;
  }
  state.filterPresets.forEach((preset, idx) => {
    const pill = document.createElement("div");
    pill.className = "preset-pill";

    const chip = document.createElement("button");
    chip.className = "chip preset-chip";
    chip.textContent = "\u{1F516} " + preset.name;
    chip.title = "Apply this saved filter combination";
    chip.addEventListener("click", () => applyPreset(preset));
    pill.appendChild(chip);

    const delBtn = document.createElement("button");
    delBtn.className = "preset-delete";
    delBtn.textContent = "✕";
    delBtn.title = "Delete preset";
    delBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      state.filterPresets.splice(idx, 1);
      saveState();
      renderPresetsList();
    });
    pill.appendChild(delBtn);

    list.appendChild(pill);
  });
}

function applyPreset(preset) {
  state.ui.categoryFilters = preset.categoryFilters.slice();
  state.ui.statusFilters = preset.statusFilters.slice();
  state.ui.todoFilters = preset.todoFilters.slice();
  state.ui.pileFilters = preset.pileFilters.slice();
  state.ui.sortBy = preset.sortBy;
  state.ui.searchQuery = preset.searchQuery;
  saveState();
  renderToolbar();
  renderContent();
}

function savePreset(name) {
  state.filterPresets.push({
    name,
    categoryFilters: state.ui.categoryFilters.slice(),
    statusFilters: state.ui.statusFilters.slice(),
    todoFilters: state.ui.todoFilters.slice(),
    pileFilters: state.ui.pileFilters.slice(),
    sortBy: state.ui.sortBy,
    searchQuery: state.ui.searchQuery
  });
  saveState();
  renderPresetsList();
}

const presetNameInput = document.getElementById("presetNameInput");
const presetSaveBtn = document.getElementById("presetSaveBtn");
function confirmSavePreset() {
  const name = presetNameInput.value.trim();
  if (!name) return;
  savePreset(name);
  presetNameInput.value = "";
}
presetSaveBtn.addEventListener("click", confirmSavePreset);
presetNameInput.addEventListener("keydown", e => { if (e.key === "Enter") confirmSavePreset(); });

renderToolbar();
renderMissionsPanel();
renderNotesPanel();
renderActivityPanel();
renderAll();

/* ---------- Bulk select ---------- */
function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderContent();
  updateBulkBar();
}
function clearSelection() {
  selectedIds.clear();
  renderContent();
  updateBulkBar();
}
function setSelectMode(on) {
  if (on && !can("bulk")) return permissionDenied("You can't bulk-edit.");
  selectMode = on;
  if (!on) selectedIds.clear();
  const btn = document.getElementById("selectModeBtn");
  btn.classList.toggle("active", on);
  btn.textContent = on ? "✕ Done" : "☑️ Select";
  if (on) {
    // Populate the bulk-action dropdowns (skin-aware labels).
    const st = document.getElementById("bulkStatus");
    st.innerHTML = '<option value="">Set status…</option>' +
      STAGES.map((s, i) => `<option value="${i}">${s.name}</option>`).join("");
    const pl = document.getElementById("bulkPile");
    pl.innerHTML = '<option value="">Move to…</option>' +
      pileOptionsForSkin().map(o => `<option value="${o.value}">${escapeHtml(o.label)}</option>`).join("");
  }
  renderContent();
  updateBulkBar();
}
function updateBulkBar() {
  const bar = document.getElementById("bulkBar");
  bar.classList.toggle("visible", selectMode && selectedIds.size > 0);
  document.getElementById("bulkCount").textContent = selectedIds.size + " selected";
}
function selectedProjects() {
  return state.projects.filter(p => selectedIds.has(p.id));
}
function bulkApplyStatus(i) {
  const list = selectedProjects();
  list.forEach(p => { p.statusIndex = i; });
  logActivity("set " + list.length + " project" + (list.length === 1 ? "" : "s") + " to " + STAGES[i].name);
  saveState();
  clearSelection();
  renderAll();
}
function bulkApplyPile(pile) {
  // Personal grouping (per-user) — not logged to the shared activity.
  const list = selectedProjects();
  list.forEach(p => { setPileValue(p, pile); });
  saveState();
  clearSelection();
  renderAll();
}
function bulkAssign(name) {
  const list = selectedProjects();
  list.forEach(p => { p.assignee = name; });
  logActivity((name ? ("assigned " + list.length + " project" + (list.length === 1 ? "" : "s") + " to " + name)
                    : ("unassigned " + list.length + " project" + (list.length === 1 ? "" : "s"))));
  saveState();
  clearSelection();
  renderToolbar();
  renderAll();
}
function bulkDelete() {
  const list = selectedProjects();
  if (list.length === 0) return;
  if (!confirm("Move " + list.length + " project" + (list.length === 1 ? "" : "s") + " to your " + (isFantasy() ? "Discard" : "Irrelevant") + "?")) return;
  list.forEach(p => { setPileValue(p, "discard"); });
  saveState();
  clearSelection();
  renderAll();
}

document.getElementById("selectModeBtn").addEventListener("click", () => setSelectMode(!selectMode));
document.getElementById("bulkClearBtn").addEventListener("click", () => setSelectMode(false));
document.getElementById("bulkStatus").addEventListener("change", e => { if (e.target.value !== "") bulkApplyStatus(parseInt(e.target.value, 10)); e.target.value = ""; });
document.getElementById("bulkPile").addEventListener("change", e => { if (e.target.value) bulkApplyPile(e.target.value); e.target.value = ""; });
document.getElementById("bulkAssignBtn").addEventListener("click", () => { bulkAssign(document.getElementById("bulkAssignee").value.trim()); document.getElementById("bulkAssignee").value = ""; });
document.getElementById("bulkDeleteBtn").addEventListener("click", bulkDelete);

/* ---------- Mobile filter drawer ---------- */
document.getElementById("toolbarMobileHeader").addEventListener("click", () => {
  const tb = document.getElementById("toolbar");
  const open = tb.classList.toggle("filters-open");
  document.getElementById("toolbarMobileHeader").setAttribute("aria-expanded", open ? "true" : "false");
});

/* ---------- Keyboard shortcuts ---------- */
document.addEventListener("keydown", e => {
  const t = e.target;
  const typing = t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.tagName === "SELECT" || t.isContentEditable);
  if (e.key === "Escape") {
    if (selectMode && !detailOverlay.classList.contains("visible")) { setSelectMode(false); return; }
  }
  if (typing || e.metaKey || e.ctrlKey || e.altKey) return;
  if (detailOverlay.classList.contains("visible")) return;
  if (e.key === "/") { e.preventDefault(); document.getElementById("searchInput").focus(); }
  else if (e.key === "n" || e.key === "N") { e.preventDefault(); openAddBar(); }
  else if (e.key === "s" || e.key === "S") { e.preventDefault(); setSelectMode(!selectMode); }
});

/* ---------- Team & roles admin ---------- */
const teamOverlay = document.getElementById("teamOverlay");
function openTeam() {
  if (!can("manageRoles")) return permissionDenied("Only admins can manage the team.");
  renderTeamModal();
  teamOverlay.classList.add("visible");
}
function closeTeam() { teamOverlay.classList.remove("visible"); }

function roleSelectEl(value, onChange, disabled) {
  const sel = document.createElement("select");
  Object.keys(ROLE_LABELS).forEach(r => {
    const o = document.createElement("option");
    o.value = r; o.textContent = ROLE_LABELS[r];
    if (r === value) o.selected = true;
    sel.appendChild(o);
  });
  sel.disabled = !!disabled;
  sel.addEventListener("change", () => onChange(sel.value));
  return sel;
}

function renderTeamModal() {
  const body = document.getElementById("teamBody");
  body.innerHTML = "";
  if (!state.roles || typeof state.roles !== "object") state.roles = {};

  const note = document.createElement("div");
  note.className = "team-note";
  note.innerHTML = "Assign a role to each teammate's <strong>login email</strong>. Anyone not listed is a <strong>Viewer</strong> (read-only). "
    + "These are in-app guardrails for a trusted team — not un-bypassable security.";
  body.appendChild(note);

  const emails = new Set();
  BOOTSTRAP_ADMINS.forEach(e => emails.add(e.toLowerCase()));
  Object.keys(state.roles).forEach(e => emails.add(e.toLowerCase()));

  [...emails].sort().forEach(email => {
    const locked = BOOTSTRAP_ADMINS.includes(email);
    const role = locked ? "admin" : (state.roles[email] || "viewer");
    const row = document.createElement("div");
    row.className = "team-row";
    const em = document.createElement("span");
    em.className = "team-email";
    em.textContent = email;
    if (email === (currentUserEmail || "").toLowerCase()) {
      const you = document.createElement("span");
      you.className = "team-you";
      you.textContent = " (you)";
      em.appendChild(you);
    }
    row.appendChild(em);

    // Admin-editable display name.
    const nameInput = document.createElement("input");
    nameInput.type = "text";
    nameInput.placeholder = "Display name";
    nameInput.value = (state.displayNames || {})[email] || "";
    nameInput.style.width = "130px";
    applyBidi(nameInput, nameInput.value);
    function commitName() {
      const v = nameInput.value.trim();
      if (!state.displayNames) state.displayNames = {};
      if (v === (state.displayNames[email] || "")) return;
      if (v) state.displayNames[email] = v; else delete state.displayNames[email];
      logActivity("set display name of " + email + " to " + (v || "(none)"));
      saveState();
      applyRoleUI();
      renderAllForPermissions();
    }
    nameInput.addEventListener("change", commitName);
    nameInput.addEventListener("blur", commitName);
    nameInput.addEventListener("keydown", e => { if (e.key === "Enter") nameInput.blur(); });
    row.appendChild(nameInput);

    row.appendChild(roleSelectEl(role, (newRole) => {
      state.roles[email] = newRole;
      logActivity("set role of " + email + " to " + ROLE_LABELS[newRole]);
      saveState();
      applyRoleUI();
      renderAllForPermissions();
    }, locked));

    if (!locked) {
      const rm = document.createElement("button");
      rm.className = "btn secondary small-btn";
      rm.textContent = "Remove";
      rm.addEventListener("click", () => {
        delete state.roles[email];
        logActivity("removed " + email + " from the team");
        saveState();
        renderTeamModal();
        applyRoleUI();
        renderAllForPermissions();
      });
      row.appendChild(rm);
    } else {
      const lock = document.createElement("span");
      lock.className = "team-you";
      lock.textContent = "locked admin";
      row.appendChild(lock);
    }
    body.appendChild(row);
  });

  // Add-member row
  const add = document.createElement("div");
  add.className = "team-add";
  const emailInput = document.createElement("input");
  emailInput.type = "email";
  emailInput.placeholder = "teammate@email.com";
  emailInput.dir = "ltr";
  const nameInput = document.createElement("input");
  nameInput.type = "text";
  nameInput.placeholder = "Display name";
  nameInput.style.width = "130px";
  const roleSel = roleSelectEl("viewer", () => {}, false);
  const addBtn = document.createElement("button");
  addBtn.className = "btn small-btn";
  addBtn.textContent = "Add member";
  function addMember() {
    const email = emailInput.value.trim().toLowerCase();
    if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { emailInput.focus(); return; }
    state.roles[email] = roleSel.value;
    const nm = nameInput.value.trim();
    if (nm) { if (!state.displayNames) state.displayNames = {}; state.displayNames[email] = nm; }
    logActivity("added " + email + " as " + ROLE_LABELS[roleSel.value]);
    saveState();
    emailInput.value = ""; nameInput.value = "";
    renderTeamModal();
    applyRoleUI();
    renderAllForPermissions();
  }
  addBtn.addEventListener("click", addMember);
  emailInput.addEventListener("keydown", e => { if (e.key === "Enter") addMember(); });
  add.appendChild(emailInput);
  add.appendChild(nameInput);
  add.appendChild(roleSel);
  add.appendChild(addBtn);
  body.appendChild(add);
}

// Re-render the whole app after a permission-relevant change.
function renderAllForPermissions() {
  renderToolbar();
  renderMissionsPanel();
  renderNotesPanel();
  renderActivityPanel();
  renderAll();
  if (openDetailId) renderDetail();
}

document.getElementById("teamBtn").addEventListener("click", openTeam);
document.getElementById("teamCloseBtn").addEventListener("click", closeTeam);
teamOverlay.addEventListener("click", e => { if (e.target === teamOverlay) closeTeam(); });

// Login gate wiring.
document.getElementById("authSignInBtn").addEventListener("click", doSignIn);
document.getElementById("authPassword").addEventListener("keydown", e => { if (e.key === "Enter") doSignIn(); });
document.getElementById("authEmail").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("authPassword").focus(); });
document.getElementById("signOutBtn").addEventListener("click", doSignOut);

// Connect to the shared backend if it's configured (otherwise stays local).
initBackend();
</script>
